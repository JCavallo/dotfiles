general {
    hide_cursor = true
}

background {
    monitor =
    path = screenshot
    blur_passes = 3
    blur_size = 8
    noise = 0.01
    contrast = 0.85
    brightness = 0.75
    vibrancy = 0.05          # near-zero ≈ greyscale
    vibrancy_darkness = 0.0
}

label {
    monitor =
    text = cmd[update:1000] date +"%H:%M"
    color = rgba(ffffffE6)
    font_size = 64
    font_family = NotoSans Nerd Font Mono Thin
    position = 0, 60
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:60000] date +"%-e %B %Y"
    color = rgba(ffffffB3)
    font_size = 22
    font_family = NotoSans Nerd Font Mono Thin
    position = 0, 0
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 300, 55
    outline_thickness = 3
    dots_size = 0.25
    dots_spacing = 0.3
    dots_center = true
    rounding = 5

    outer_color = rgba(231f20D9)
    inner_color = rgba(00000000)
    font_color = rgba(ffffffFF)

    check_color = rgba(d9d8d8FF)      # verifying — matches ring-ver-color
    fail_color = rgba(ee2e24FF)       # wrong — matches ring-wrong-color
    capslock_color = rgba(009ddcFF)   # matches caps-lock line color

    fade_on_empty = true
    fade_timeout = 2000
    placeholder_text =
    fail_text = <i>$FAIL ($ATTEMPTS)</i>
    position = 0, -30
    halign = center
    valign = center
}
