general {
    lock_cmd = hyprlock
    before_sleep_cmd = loginctl lock-session
    after_sleep_cmd = hyprctl dispatch dpms on
    ignore_dbus_inhibit = false
}

listener {
    timeout = 240
    on-timeout = idle-guard jcnotify "Locking in 1min"
}

listener {
    timeout = 300
    on-timeout = idle-guard loginctl lock-session
}

listener {
    timeout = 600
    on-timeout = idle-guard hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on
}

listener {
    timeout = 900
    on-timeout = idle-guard systemctl suspend
}
